apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfoliowebsite
  namespace: portfoliowebsite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfoliowebsite
  template:
    metadata:
      labels:
        app: portfoliowebsite
    spec:
      containers:
        - name: app
          image: ghcr.io/mschmidlin1/portfolio-website:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
